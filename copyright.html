<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SortingGo Copyright Notice">
  <title>Copyright Notice — SortingGo</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function () {
      var lang = (navigator.language || 'en').toLowerCase();
      var target = 'en';
      if (lang.indexOf('zh') === 0) {
        target = (lang.indexOf('cn') !== -1 || lang.indexOf('sg') !== -1) ? 'cn' : 'tw';
      } else if (lang.indexOf('ja') === 0) {
        target = 'ja';
      } else if (lang.indexOf('th') === 0) {
        target = 'th';
      } else if (lang.indexOf('vi') === 0) {
        target = 'vi';
      } else if (lang.indexOf('en') === 0) {
        target = 'en';
      }
      location.replace('copyright_' + target + '.html');
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=copyright_en.html">
  </noscript>
</head>
<body>
  <div class="redirect-page">
    <div>
      <h1>Redirecting to the SortingGo Copyright Notice…</h1>
      <p>If you are not redirected automatically, please choose your language:</p>
      <div class="fallback-links">
        <a href="copyright_tw.html">繁體中文</a>
        <a href="copyright_cn.html">简体中文</a>
        <a href="copyright_en.html">English</a>
        <a href="copyright_ja.html">日本語</a>
        <a href="copyright_th.html">ภาษาไทย</a>
        <a href="copyright_vi.html">Tiếng Việt</a>
      </div>
    </div>
  </div>
</body>
</html>
